<svg viewBox="0 0 780 170" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
<defs>
  <linearGradient id="tBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0A0F1C"/>
    <stop offset="100%" stop-color="#121A2E"/>
  </linearGradient>
  <linearGradient id="shine2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#ffffff" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="tClip"><rect x="0" y="0" width="780" height="170" rx="16"/></clipPath>
</defs>
<style>
  @keyframes popIn { from { opacity:0; transform:scale(0.85) translateY(10px);} to { opacity:1; transform:scale(1) translateY(0);} }
  @keyframes shineSweep { 0% { transform:translateX(-140px);} 100% { transform:translateX(140px);} }
  @keyframes glowPulse { 0%,100% { opacity:0.8;} 50% { opacity:1;} }
  .cell { opacity:0; animation: popIn .5s ease-out forwards; transform-origin:center; }
  .c0{animation-delay:.15s}.c1{animation-delay:.3s}.c2{animation-delay:.45s}.c3{animation-delay:.6s}.c4{animation-delay:.75s}
  .shine { animation: shineSweep 3.5s ease-in-out infinite; }
  .rank { animation: glowPulse 2.5s ease-in-out infinite; }
</style>
<g clip-path="url(#tClip)">
  <rect width="780" height="170" fill="url(#tBg)"/>
  <g>
    <!-- 5 trophy cells -->
    <g class="cell c0" transform="translate(20,15)">
      <rect width="140" height="140" rx="14" fill="#0F1626" stroke="#FF8A3D" stroke-opacity="0.5"/>
      <clipPath id="cc0"><rect width="140" height="140" rx="14"/></clipPath>
      <g clip-path="url(#cc0)"><rect class="shine" x="-20" y="0" width="60" height="140" fill="url(#shine2)" transform="rotate(20 70 70)"/></g>
      <text x="70" y="45" text-anchor="middle" font-size="30">&#127942;</text>
      <text x="70" y="80" text-anchor="middle" font-size="12" fill="#CBD5E1">Stars</text>
      <text x="70" y="98" text-anchor="middle" font-size="14" fill="#E2E8F0" font-weight="700">12</text>
      <text class="rank" x="70" y="120" text-anchor="middle" font-size="11" fill="#FF8A3D">SSS</text>
    </g>
    <g class="cell c1" transform="translate(170,15)">
      <rect width="140" height="140" rx="14" fill="#0F1626" stroke="#2DD4BF" stroke-opacity="0.5"/>
      <clipPath id="cc1"><rect width="140" height="140" rx="14"/></clipPath>
      <g clip-path="url(#cc1)"><rect class="shine" x="-20" y="0" width="60" height="140" fill="url(#shine2)" transform="rotate(20 70 70)"/></g>
      <text x="70" y="45" text-anchor="middle" font-size="30">&#128171;</text>
      <text x="70" y="80" text-anchor="middle" font-size="12" fill="#CBD5E1">Commits</text>
      <text x="70" y="98" text-anchor="middle" font-size="14" fill="#E2E8F0" font-weight="700">438</text>
      <text class="rank" x="70" y="120" text-anchor="middle" font-size="11" fill="#2DD4BF">A+</text>
    </g>
    <g class="cell c2" transform="translate(320,15)">
      <rect width="140" height="140" rx="14" fill="#0F1626" stroke="#A78BFA" stroke-opacity="0.5"/>
      <clipPath id="cc2"><rect width="140" height="140" rx="14"/></clipPath>
      <g clip-path="url(#cc2)"><rect class="shine" x="-20" y="0" width="60" height="140" fill="url(#shine2)" transform="rotate(20 70 70)"/></g>
      <text x="70" y="45" text-anchor="middle" font-size="30">&#128295;</text>
      <text x="70" y="80" text-anchor="middle" font-size="12" fill="#CBD5E1">PullRequest</text>
      <text x="70" y="98" text-anchor="middle" font-size="14" fill="#E2E8F0" font-weight="700">9</text>
      <text class="rank" x="70" y="120" text-anchor="middle" font-size="11" fill="#A78BFA">A</text>
    </g>
    <g class="cell c3" transform="translate(470,15)">
      <rect width="140" height="140" rx="14" fill="#0F1626" stroke="#5EEAD4" stroke-opacity="0.5"/>
      <clipPath id="cc3"><rect width="140" height="140" rx="14"/></clipPath>
      <g clip-path="url(#cc3)"><rect class="shine" x="-20" y="0" width="60" height="140" fill="url(#shine2)" transform="rotate(20 70 70)"/></g>
      <text x="70" y="45" text-anchor="middle" font-size="30">&#128193;</text>
      <text x="70" y="80" text-anchor="middle" font-size="12" fill="#CBD5E1">Repositories</text>
      <text x="70" y="98" text-anchor="middle" font-size="14" fill="#E2E8F0" font-weight="700">14</text>
      <text class="rank" x="70" y="120" text-anchor="middle" font-size="11" fill="#5EEAD4">A+</text>
    </g>
    <g class="cell c4" transform="translate(620,15)">
      <rect width="140" height="140" rx="14" fill="#0F1626" stroke="#F472B6" stroke-opacity="0.5"/>
      <clipPath id="cc4"><rect width="140" height="140" rx="14"/></clipPath>
      <g clip-path="url(#cc4)"><rect class="shine" x="-20" y="0" width="60" height="140" fill="url(#shine2)" transform="rotate(20 70 70)"/></g>
      <text x="70" y="45" text-anchor="middle" font-size="30">&#128101;</text>
      <text x="70" y="80" text-anchor="middle" font-size="12" fill="#CBD5E1">Followers</text>
      <text x="70" y="98" text-anchor="middle" font-size="14" fill="#E2E8F0" font-weight="700">21</text>
      <text class="rank" x="70" y="120" text-anchor="middle" font-size="11" fill="#F472B6">B+</text>
    </g>
  </g>
</g>
</svg>
