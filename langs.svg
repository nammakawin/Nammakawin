<svg viewBox="0 0 380 195" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
<defs>
  <linearGradient id="lBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0A0F1C"/>
    <stop offset="100%" stop-color="#121A2E"/>
  </linearGradient>
  <clipPath id="lClip"><rect x="0" y="0" width="380" height="195" rx="16"/></clipPath>
</defs>
<style>
  @keyframes fadeIn { from { opacity:0;} to { opacity:1;} }
  @keyframes barGrow { 0%,100% { opacity:0.9; } 50% { opacity:1; } }
  .title { opacity:0; animation: fadeIn .5s ease-out forwards; }
  .lbl { opacity:0; animation: fadeIn .5s ease-out forwards; }
  .bar { animation: barGrow 3s ease-in-out infinite; }
</style>
<g clip-path="url(#lClip)">
  <rect width="380" height="195" fill="url(#lBg)"/>
  <text class="title" x="25" y="32" font-size="16" font-weight="700" fill="#E2E8F0">Most Used Languages</text>

  <g font-size="12" fill="#CBD5E1">
    <text class="lbl" x="25" y="58" style="animation-delay:.2s">Python</text>
    <rect x="25" y="64" width="330" height="8" rx="4" fill="#1E293B"/>
    <rect class="bar" x="25" y="64" height="8" rx="4" fill="#FF8A3D"><animate attributeName="width" from="0" to="145" dur="1s" begin=".3s" fill="freeze"/></rect>

    <text class="lbl" x="25" y="88" style="animation-delay:.4s">MATLAB</text>
    <rect x="25" y="94" width="330" height="8" rx="4" fill="#1E293B"/>
    <rect class="bar" x="25" y="94" height="8" rx="4" fill="#2DD4BF"><animate attributeName="width" from="0" to="112" dur="1s" begin=".5s" fill="freeze"/></rect>

    <text class="lbl" x="25" y="118" style="animation-delay:.6s">Jupyter Notebook</text>
    <rect x="25" y="124" width="330" height="8" rx="4" fill="#1E293B"/>
    <rect class="bar" x="25" y="124" height="8" rx="4" fill="#A78BFA"><animate attributeName="width" from="0" to="79" dur="1s" begin=".7s" fill="freeze"/></rect>

    <text class="lbl" x="25" y="148" style="animation-delay:.8s">C++</text>
    <rect x="25" y="154" width="330" height="8" rx="4" fill="#1E293B"/>
    <rect class="bar" x="25" y="154" height="8" rx="4" fill="#5EEAD4"><animate attributeName="width" from="0" to="46" dur="1s" begin=".9s" fill="freeze"/></rect>

    <text class="lbl" x="25" y="178" style="animation-delay:1s">HTML</text>
    <rect x="25" y="184" width="330" height="6" rx="3" fill="#1E293B"/>
    <rect class="bar" x="25" y="184" height="6" rx="3" fill="#F472B6"><animate attributeName="width" from="0" to="26" dur="1s" begin="1.1s" fill="freeze"/></rect>
  </g>
</g>
</svg>
