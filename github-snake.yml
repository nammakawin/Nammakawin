name: Generate Snake

on:
  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Generate Snake
        uses: Platane/snk@v3
        id: snake

        with:
          github_user_name: Nammakawin

          outputs: |
            dist/github-snake.svg?color_snake=%23A855F7&color_dots=%23000000,%233B0764,%236D28D9,%238B5CF6,%23C084FC

            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23A855F7&color_dots=%23000000,%233B0764,%236D28D9,%238B5CF6,%23C084FC

      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v4

        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
