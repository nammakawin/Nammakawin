name: Generate Snake

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: Nammakawin
          outputs: |
            dist/github-snake.svg?color_snake=%23A78BFA&color_dots=%230F1626,%232E1065,%235B21B6,%237C3AED,%23A78BFA
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23A78BFA&color_dots=%230F1626,%232E1065,%235B21B6,%237C3AED,%23A78BFA

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
